<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>KOFA Recruit Monitor</title>

<style>

body{
font-family: Arial;
max-width: 800px;
margin: auto;
padding: 40px;
background:#f5f5f5;
}

h1{
color:#222;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

a{
text-decoration:none;
color:#0066cc;
}

</style>
</head>

<body>

<h1>KOFA 채용 공고 모니터</h1>

<p>
이 페이지는 한국영상자료원 채용 공고를 자동으로 모니터링합니다.
</p>

<div id="jobs"></div>

<script>

async function loadJobs(){

const res = await fetch("jobs.json");
const data = await res.json();

const container = document.getElementById("jobs");

data.forEach(job=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<h3>${job.title}</h3>
<p>${job.date}</p>
<a href="${job.link}" target="_blank">공고 보기</a>
`;

container.appendChild(div);

});

}

loadJobs();

</script>

</body>
</html>
